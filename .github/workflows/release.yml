on:
  release:
    types: [published]

jobs:
  call-build:
    uses: ./.github/workflows/build.yml
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Compare mod version and release tag
        run: |
          mod_version="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)"
          echo "::group::Versions"
          echo "Mod version = ${mod_version}"
          echo "Release tag = ${{ github.event.release.tag_name }}"
          echo "::endgroup::"
          if [ "${mod_version}" != "${{ github.event.release.tag_name }}" ]; then
            echo "::error file=gradle.properties::mod_version does not match release tag (expected ${mod_version}, got ${{ github.event.release.tag_name }})"
            exit 1
          fi
  upload-artifacts:
    needs: [call-build, verify-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built jars
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: jars
      - name: Upload jars to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} jars/*.jar --repo ${{ github.repository }}
