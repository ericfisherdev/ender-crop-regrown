repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: local
    hooks:
      - id: spotless
        name: Spotless Java format check
        language: system
        entry: ./gradlew spotlessCheck
        pass_filenames: false
        types: [java]

      - id: no-local-gradle-java-home
        name: Block local org.gradle.java.home
        language: pygrep
        entry: 'org\.gradle\.java\.home'
        files: gradle\.properties$
